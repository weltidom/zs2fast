name: Build and Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }} - Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Maturin
      run: pip install maturin

    - name: Build package
      run: maturin build --release

    - name: Install package
      run: pip install --find-links target/wheels zs2fast

    - name: Test import
      run: python -c "import zs2fast; print('zs2fast imported successfully')"

    - name: Upload wheels (attempt 1)
      id: upload_wheels_1
      continue-on-error: true
      uses: actions/upload-artifact@v5
      with:
        name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
        path: target/wheels/*.whl
        if-no-files-found: error
        overwrite: true

    - name: Upload wheels (attempt 2)
      id: upload_wheels_2
      if: steps.upload_wheels_1.outcome == 'failure'
      uses: actions/upload-artifact@v5
      with:
        name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
        path: target/wheels/*.whl
        if-no-files-found: error
        overwrite: true

    - name: Fail if upload failed twice
      if: steps.upload_wheels_1.outcome == 'failure' && steps.upload_wheels_2.outcome == 'failure'
      run: |
        echo "Artifact upload failed after two attempts"
        exit 1

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy -- -D warnings
