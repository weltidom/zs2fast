name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Maturin
      run: pip install maturin

    - name: Build wheels
      run: maturin build --release --out dist

    - name: Upload wheels (attempt 1)
      id: upload_wheels_1
      continue-on-error: true
      uses: actions/upload-artifact@v5
      with:
        name: wheels-${{ matrix.os }}
        path: dist/*.whl
        if-no-files-found: error
        overwrite: true

    - name: Upload wheels (attempt 2)
      id: upload_wheels_2
      if: steps.upload_wheels_1.outcome == 'failure'
      uses: actions/upload-artifact@v5
      with:
        name: wheels-${{ matrix.os }}
        path: dist/*.whl
        if-no-files-found: error
        overwrite: true

    - name: Fail if upload failed twice
      if: steps.upload_wheels_1.outcome == 'failure' && steps.upload_wheels_2.outcome == 'failure'
      run: |
        echo "Artifact upload failed after two attempts"
        exit 1

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install Maturin
      run: pip install maturin

    - name: Build sdist
      run: maturin sdist --out dist

    - name: Upload sdist (attempt 1)
      id: upload_sdist_1
      continue-on-error: true
      uses: actions/upload-artifact@v5
      with:
        name: sdist
        path: dist/*.tar.gz
        if-no-files-found: error
        overwrite: true

    - name: Upload sdist (attempt 2)
      id: upload_sdist_2
      if: steps.upload_sdist_1.outcome == 'failure'
      uses: actions/upload-artifact@v5
      with:
        name: sdist
        path: dist/*.tar.gz
        if-no-files-found: error
        overwrite: true

    - name: Fail if sdist upload failed twice
      if: steps.upload_sdist_1.outcome == 'failure' && steps.upload_sdist_2.outcome == 'failure'
      run: |
        echo "sdist upload failed after two attempts"
        exit 1

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/zs2fast
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v5
      with:
        path: dist
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
